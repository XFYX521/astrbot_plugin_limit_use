<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>用户次数管理</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-secondary: #666;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --danger: #ef4444;
      --success: #22c55e;
      --warn-bg: #fef3c7;
      --warn-text: #92400e;
    }
    [data-theme="dark"] {
      --bg: #1a1a2e;
      --card: #16213e;
      --border: #2a2a4a;
      --text: #e0e0e0;
      --text-secondary: #a0a0b0;
      --primary: #818cf8;
      --primary-hover: #6366f1;
      --warn-bg: #3a3a1a;
      --warn-text: #e0c070;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stats-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      flex: 1;
      min-width: 140px;
    }
    .stat-card .label { font-size: 12px; color: var(--text-secondary); }
    .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: var(--border);
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    td { font-size: 14px; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-ok { background: #dcfce7; color: #166534; }
    .badge-low { background: #fef3c7; color: #92400e; }
    .badge-empty { background: #fee2e2; color: #991b1b; }

    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-edit { background: var(--border); color: var(--text); }
    .btn-edit:hover { background: #ccc; }
    .btn-save { background: var(--success); color: #fff; }
    .btn-cancel { background: #999; color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }

    .edit-row input {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      width: 80px;
      background: var(--bg);
      color: var(--text);
    }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast-success { background: #22c55e; color: #fff; }
    .toast-error { background: #ef4444; color: #fff; }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <h1>📊 用户次数管理</h1>

  <div class="stats-bar" id="statsBar"></div>

  <div id="tableWrap">
    <div class="loading">加载中...</div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    const bridge = window.AstrBotPluginPage;
    await bridge.ready();

    // ── DOM 引用 ──
    const statsBar = document.getElementById('statsBar');
    const tableWrap = document.getElementById('tableWrap');
    const toastEl = document.getElementById('toast');

    // ── Toast ──
    function showToast(msg, type = 'success') {
      toastEl.textContent = msg;
      toastEl.className = `toast toast-${type} show`;
      setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    // ── 加载数据 ──
    async function loadData() {
      tableWrap.innerHTML = '<div class="loading">加载中...</div>';
      try {
        const res = await bridge.apiGet('users');
        render(res.users || []);
      } catch (e) {
        tableWrap.innerHTML = `<div class="loading" style="color:#ef4444;">加载失败: ${e.message}</div>`;
      }
    }

    // ── 渲染 ──
    function render(users) {
      // 统计栏
      const total = users.length;
      const usedSum = users.reduce((s, u) => s + u.total_used, 0);
      const remainSum = users.reduce((s, u) => s + u.remaining, 0);
      statsBar.innerHTML = `
        <div class="stat-card"><div class="label">用户总数</div><div class="value">${total}</div></div>
        <div class="stat-card"><div class="label">累积调用次数</div><div class="value">${usedSum}</div></div>
        <div class="stat-card"><div class="label">剩余总次数</div><div class="value">${remainSum}</div></div>
      `;

      if (!users.length) {
        tableWrap.innerHTML = '<div class="empty-state">暂无用户数据</div>';
        return;
      }

      let html = `<table>
        <thead><tr>
          <th>QQ号</th>
          <th>累积调用</th>
          <th>剩余次数</th>
          <th>最后签到</th>
          <th>状态</th>
          <th>操作</th>
        </tr></thead><tbody>`;

      for (const u of users) {
        let statusBadge = '';
        if (u.remaining <= 0) {
          statusBadge = '<span class="badge badge-empty">已用完</span>';
        } else if (u.remaining <= 3) {
          statusBadge = '<span class="badge badge-low">不足</span>';
        } else {
          statusBadge = '<span class="badge badge-ok">充足</span>';
        }
        const lastSignin = u.last_signin || '-';

        html += `<tr data-uid="${u.user_id}">
          <td><strong>${u.user_id}</strong></td>
          <td class="td-used">${u.total_used}</td>
          <td class="td-remain">${u.remaining}</td>
          <td>${lastSignin}</td>
          <td>${statusBadge}</td>
          <td class="actions">
            <button class="btn btn-edit btn-sm" data-action="edit">编辑</button>
          </td>
        </tr>`;
      }

      html += '</tbody></table>';
      tableWrap.innerHTML = html;

      // 绑定编辑按钮
      tableWrap.querySelectorAll('[data-action="edit"]').forEach(btn => {
        btn.addEventListener('click', () => enterEdit(btn.closest('tr')));
      });
    }

    // ── 进入编辑模式 ──
    function enterEdit(tr) {
      const uid = tr.dataset.uid;
      const usedEl = tr.querySelector('.td-used');
      const remainEl = tr.querySelector('.td-remain');
      const actionsEl = tr.querySelector('.actions');

      const origUsed = usedEl.textContent;
      const origRemain = remainEl.textContent;

      usedEl.innerHTML = `<input type="number" class="edit-used" value="${origUsed}" min="0" />`;
      remainEl.innerHTML = `<input type="number" class="edit-remain" value="${origRemain}" min="0" />`;
      actionsEl.innerHTML = `
        <button class="btn btn-save btn-sm" data-action="save">保存</button>
        <button class="btn btn-cancel btn-sm" data-action="cancel">取消</button>
      `;

      actionsEl.querySelector('[data-action="save"]').addEventListener('click', async () => {
        const newUsed = parseInt(tr.querySelector('.edit-used').value, 10) || 0;
        const newRemain = parseInt(tr.querySelector('.edit-remain').value, 10) || 0;
        try {
          await bridge.apiPost(`users/${uid}`, {
            total_used: newUsed,
            remaining: newRemain,
          });
          showToast(`用户 ${uid} 已更新`);
          loadData(); // 刷新
        } catch (e) {
          showToast(`保存失败: ${e.message}`, 'error');
        }
      });

      actionsEl.querySelector('[data-action="cancel"]').addEventListener('click', () => {
        loadData(); // 刷新还原
      });
    }

    // ── 初始加载 ──
    loadData();
  </script>
</body>
</html>
