<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>用户次数管理</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-secondary: #666;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
    }
    [data-theme="dark"] {
      --bg: #1a1a2e;
      --card: #16213e;
      --border: #2a2a4a;
      --text: #e0e0e0;
      --text-secondary: #a0a0b0;
      --primary: #818cf8;
      --primary-hover: #6366f1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }
    h1 {
      font-size: 20px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .h1-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    .stats-bar {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      flex: 1; min-width: 100px;
    }
    .stat-card .label { font-size: 12px; color: var(--text-secondary); }
    .stat-card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }

    .tabs {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    .tab {
      padding: 8px 18px; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600;
      background: var(--border); color: var(--text-secondary);
      border: none; transition: 0.15s;
    }
    .tab.active {
      background: var(--primary); color: #fff;
    }
    .tab:hover:not(.active) { background: #ccc; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: var(--border);
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 600;
      white-space: nowrap;
    }
    td { font-size: 14px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    .num { font-weight: 600; font-size: 15px; min-width: 36px; display: inline-block; text-align: center; }

    .btn {
      border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      padding: 5px 12px; min-width: 42px;
      transition: background 0.15s;
    }
    .btn-refresh { background: var(--primary); color: #fff; }
    .btn-refresh:hover { background: var(--primary-hover); }

    .btn-group { display: flex; gap: 6px; align-items: center; }
    .btn-plus10  { background: #22c55e; color: #fff; }
    .btn-plus10:hover { background: #16a34a; }
    .btn-plus1   { background: #86efac; color: #166534; }
    .btn-plus1:hover { background: #4ade80; }
    .btn-minus1  { background: #fca5a5; color: #991b1b; }
    .btn-minus1:hover { background: #f87171; }
    .btn-minus10 { background: #ef4444; color: #fff; }
    .btn-minus10:hover { background: #dc2626; }

    .remark-text {
      cursor: pointer; padding: 3px 8px; border-radius: 4px;
      display: inline-block; max-width: 100px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .remark-text:hover { background: var(--border); }
    .remark-empty {
      color: var(--text-secondary); font-style: italic;
      cursor: pointer; padding: 3px 8px; border-radius: 4px;
    }
    .remark-empty:hover { background: var(--border); }
    .remark-input {
      padding: 4px 8px; border: 1px solid var(--primary);
      border-radius: 4px; font-size: 13px; width: 100px;
      background: var(--bg); color: var(--text); outline: none;
    }

    .empty-state, .loading {
      text-align: center; padding: 40px 20px; color: var(--text-secondary);
    }

    .toast {
      position: fixed; top: 16px; right: 16px;
      padding: 10px 18px; border-radius: 8px;
      font-size: 14px; z-index: 999;
      opacity: 0; transition: opacity 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast-success { background: #22c55e; color: #fff; }
    .toast-error { background: #ef4444; color: #fff; }
  </style>
</head>
<body>

  <h1>
    📊 用户管理
    <span class="h1-right">
      <button class="btn btn-refresh" id="btnRefresh">🔄 刷新</button>
    </span>
  </h1>

  <div class="stats-bar" id="statsBar"></div>

  <div id="tableWrap"><div class="loading">加载中...</div></div>
  <div id="toast" class="toast"></div>

  <script type="module">
    const bridge = window.AstrBotPluginPage;
    await bridge.ready();

    const statsBar = document.getElementById('statsBar');
    const tableWrap = document.getElementById('tableWrap');
    const toastEl = document.getElementById('toast');
    const btnRefresh = document.getElementById('btnRefresh');

    let usersData = [];
    let metaData = {};

    function toast(msg, type = 'success') {
      toastEl.textContent = msg;
      toastEl.className = `toast toast-${type} show`;
      setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    btnRefresh.addEventListener('click', () => { loadData(); toast('已刷新'); });

    // ── 加载数据 ──
    async function loadData() {
      tableWrap.innerHTML = '<div class="loading">加载中...</div>';
      try {
        const res = await bridge.apiGet('users');
        usersData = res.users || [];
        metaData = {
          today_tokens_sum: res.today_tokens_sum || 0,
          total_tokens_sum: res.total_tokens_sum || 0,
        };
        renderStats();
        renderTable();
      } catch (e) {
        tableWrap.innerHTML = `<div class="loading" style="color:#ef4444;">加载失败: ${e.message}</div>`;
      }
    }

    // ── 统计栏 ──
    function renderStats() {
      const total = usersData.length;
      const usedSum = usersData.reduce((s, u) => s + u.total_used, 0);
      const remainSum = usersData.reduce((s, u) => s + u.remaining, 0);
      const avgK = usedSum > 0 ? (metaData.total_tokens_sum / usedSum / 1000).toFixed(1) : 0;
      statsBar.innerHTML = `
        <div class="stat-card"><div class="label">用户总数</div><div class="value">${total}</div></div>
        <div class="stat-card"><div class="label">累积调用</div><div class="value">${usedSum}</div></div>
        <div class="stat-card"><div class="label">剩余总次数</div><div class="value">${remainSum}</div></div>
        <div class="stat-card"><div class="label">累积 Token</div><div class="value">${metaData.total_tokens_sum.toLocaleString()}</div></div>
        <div class="stat-card"><div class="label">今日 Token</div><div class="value">${metaData.today_tokens_sum.toLocaleString()}</div></div>
        <div class="stat-card"><div class="label">平均 Token</div><div class="value">${avgK}k</div></div>
      `;
    }

    // ── 表格 ──
    function renderTable() {
      if (!usersData.length) {
        tableWrap.innerHTML = '<div class="empty-state">暂无用户数据</div>';
        return;
      }

      // 按累积 token 降序
      const sorted = [...usersData].sort((a, b) => (b.total_tokens || 0) - (a.total_tokens || 0));

      let html = `<table>
        <thead><tr>
          <th>QQ号</th>
          <th>备注</th>
          <th>已调用</th>
          <th>剩余次数</th>
          <th>今日 Token</th>
          <th>累积 Token</th>
          <th>平均 Token</th>
          <th>操作</th>
        </tr></thead><tbody>`;

      for (const u of sorted) {
        const remarkHtml = u.remark
          ? `<span class="remark-text" title="点击编辑备注">${escapeHtml(u.remark)}</span>`
          : `<span class="remark-empty">+ 添加备注</span>`;

        html += `<tr data-uid="${u.user_id}">
          <td><strong>${u.user_id}</strong></td>
          <td><div class="td-remark">${remarkHtml}</div></td>
          <td><span class="num">${u.total_used}</span></td>
          <td><span class="num td-remain" id="r-${u.user_id}">${u.remaining}</span></td>
          <td><span class="num" style="color:var(--primary)">${(u.today_tokens || 0).toLocaleString()}</span></td>
          <td><span class="num">${(u.total_tokens || 0).toLocaleString()}</span></td>
          <td><span class="num">${u.avg_tokens_k || 0}k</span></td>
          <td>
            <div class="btn-group">
              <button class="btn btn-plus10"  data-uid="${u.user_id}" data-delta="10">+10</button>
              <button class="btn btn-plus1"   data-uid="${u.user_id}" data-delta="1">+1</button>
              <button class="btn btn-minus1"  data-uid="${u.user_id}" data-delta="-1">-1</button>
              <button class="btn btn-minus10" data-uid="${u.user_id}" data-delta="-10">-10</button>
            </div>
          </td>
        </tr>`;
      }

      html += '</tbody></table>';
      tableWrap.innerHTML = html;

      // 绑定备注
      tableWrap.querySelectorAll('.td-remark').forEach(el => {
        el.addEventListener('click', () => enterRemark(el));
      });

      // 绑定调次按钮
      tableWrap.querySelectorAll('[data-delta]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const uid = btn.dataset.uid;
          const delta = parseInt(btn.dataset.delta, 10);
          const remainEl = document.getElementById(`r-${uid}`);
          const cur = parseInt(remainEl.textContent, 10);
          const newVal = Math.max(0, cur + delta);
          if (newVal === cur) return;
          try {
            const res = await bridge.apiGet(`update/${uid}/${newVal}`);
            remainEl.textContent = res.remaining;
            loadData();
          } catch (e) {
            toast(`操作失败: ${e.message}`, 'error');
          }
        });
      });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    // ── 编辑备注 ──
    function enterRemark(td) {
      const tr = td.closest('tr');
      const uid = tr.dataset.uid;
      const span = td.querySelector('.remark-text, .remark-empty');
      const oldText = td.querySelector('.remark-text')
        ? td.querySelector('.remark-text').textContent
        : '';

      td.innerHTML = `<input class="remark-input" value="${oldText}" placeholder="备注" maxlength="20" />`;
      const input = td.querySelector('input');
      input.focus();
      input.select();

      async function save() {
        const val = input.value.trim();
        try {
          await bridge.apiGet(`remark/${uid}`, { text: val });
          loadData();
        } catch (e) {
          toast(`备注保存失败: ${e.message}`, 'error');
          loadData();
        }
      }

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') { e.preventDefault(); loadData(); }
      });
      input.addEventListener('blur', save);
    }

    loadData();
  </script>
</body>
</html>
