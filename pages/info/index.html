<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>对话次数限制</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-secondary: #666;
    }
    [data-theme="dark"] {
      --bg: #1a1a2e;
      --card: #16213e;
      --border: #2a2a4a;
      --text: #e0e0e0;
      --text-secondary: #a0a0b0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    h1 { font-size: 20px; margin-bottom: 16px; }
    .info { 
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      line-height: 1.8;
      font-size: 14px;
    }
    .info strong { color: var(--text); }
    .tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #6366f1;
      color: #fff;
      margin: 4px 4px 0 0;
    }
  </style>
</head>
<body>
  <h1>📊 对话次数限制</h1>
  <div class="info">
    <p><strong>版本：</strong>v1.0.2</p>
    <p><strong>说明：</strong>给 QQ 用户设置对话次数额度，用完需签到补充。</p>
    <p style="margin-top:12px;"><strong>可用指令：</strong></p>
    <p>├ <code>/帮助</code> — 显示帮助菜单</p>
    <p>├ <code>/签到</code> — 每日获取对话次数</p>
    <p>└ <code>/我的余额</code> — 查看剩余次数</p>
    <p style="margin-top:12px;"><strong>配置提示：</strong></p>
    <p>次数相关配置请在 WebUI 插件配置面板中修改。</p>
    <p>管理员 QQ 号填入 <code>admin_users</code> 列表即可免次数限制。</p>
  </div>
</body>
</html>
